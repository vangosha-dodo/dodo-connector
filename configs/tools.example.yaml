tools:
  - name: dodo_delivery_courier_orders
    description: Read Dodo IS courier order rows for delivery analytics and courier reports.
    connector: dodo
    method: GET
    path: /dodopizza/{country}/delivery/couriers-orders
    risk_level: read
    enabled: true
    status: active
    required_params:
      - units
      - from
      - to
    allowed_query_params:
      - units
      - from
      - to
      - skip
      - take
    max_response_chars: 30000
    tags:
      - openclaw-derived
      - courier-report
      - delivery
    source_evidence:
      - OpenClaw skill dodo-courier-report pulls delivery/couriers-orders.
      - Temporary checks compared Tambov-3 courier UI with Dodo API delivery/couriers-orders.

  - name: dodo_staff_shifts
    description: Read Dodo IS staff shifts, primarily courier shifts for productivity calculations.
    connector: dodo
    method: GET
    path: /dodopizza/{country}/staff/shifts
    risk_level: read
    enabled: true
    status: active
    required_params:
      - units
      - clockInFrom
      - clockInTo
    allowed_query_params:
      - units
      - clockInFrom
      - clockInTo
      - staffTypeName
      - skip
      - take
    max_response_chars: 30000
    tags:
      - openclaw-derived
      - courier-report
      - staff
    source_evidence:
      - OpenClaw skill dodo-courier-report combines staff/shifts with courier orders.

  - name: dodo_staff_vacancies_count
    description: Read Dodo IS open vacancy counts by unit.
    connector: dodo
    method: GET
    path: /dodopizza/{country}/staff/vacancies/count
    risk_level: read
    enabled: true
    status: active
    allowed_query_params:
      - units
      - countryCode
      - skip
      - take
    max_response_chars: 30000
    tags:
      - api-priority
      - staff
      - vacancies
      - management
    source_evidence:
      - Live Dodo API check on 2026-06-16 returned vacancies, vacanciesCount, location, and isEndOfListReached.
      - Endpoint accepts optional units, countryCode, take, and skip.

