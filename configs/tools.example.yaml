    enabled: true
    status: active
    required_params:
      - unit
      - month
      - year
    allowed_query_params:
      - unit
      - month
      - year
    max_response_chars: 12000
    tags:
      - api-priority
      - units
      - goals
      - management
    source_evidence:
      - Official Dodo IS docs list units/month-goals with unit, month, and year query parameters.
      - Live Dodo API check on 2026-06-16 returned sales, deliverySales, leakage, writeOffsDueToDefectiveProduct, and defectiveProduct.

