  - name: superset_employee_discount_chart
    description: Read the approved Superset employee discount chart data for discount reconciliation.
    connector: superset
    method: POST
    path: /api/v1/chart/data
    risk_level: read
    enabled: true
    status: active
    required_params:
      - dashboard_id
      - chart_id
      - metric
    allowed_query_params:
      - dashboard_id
    allowed_dashboard_ids:
      - 1410
    allowed_chart_ids:
      - 26708
    allowed_metrics:
      - employee_segment_discount
    max_response_chars: 30000
    tags:
      - openclaw-derived
      - superset
      - employee-discount
    source_evidence:
      - OpenClaw Superset evidence used /api/v1/chart/data?dashboard_id=1410 and chart 26708.
      - OpenClaw exports reconciled employee discounts for Jan-May 2026.

  - name: superset_kiosk_sales_share
    description: Read approved Superset chart data for monthly share of sales via kiosks.
    connector: superset
    method: POST
    path: /api/v1/chart/data
    risk_level: read
    enabled: true
    status: active
    required_params:
      - dashboard_id
      - chart_id
      - metric
    allowed_query_params:
      - dashboard_id
    allowed_dashboard_ids:
      - 714
    allowed_chart_ids:
      - 9533
    allowed_metrics:
      - Share sales via Kiosk
    max_response_chars: 30000
    tags:
      - openclaw-derived
      - superset
      - marketing
      - kiosk
    source_evidence:
      - OpenClaw cron job "Доля продаж через киоски" uses Superset ordres_types_analytics.
      - "Source metric from cron payload: Share sales via Kiosk."
      - OpenClaw automation captured dashboard 714, datasource 168, and chart 9533.

  - name: superset_clients_phone_share
    description: Read approved Superset chart data for dine-in identified orders via cashier.
    connector: superset
    method: POST
    path: /superset/api/v1/chart/data
    base_url: https://officemanager.dodois.io
    dashboard_url: https://officemanager.dodois.io/OfficeManager/Analytics/Client_analytics
    risk_level: read
    enabled: true
    status: active
    required_params:
      - dashboard_id
      - chart_id
      - metric
    allowed_query_params:
      - dashboard_id
    allowed_dashboard_ids:
      - 868
    allowed_chart_ids:
      - 18721
    allowed_metrics:
      - Share of dine in identified orders via cashier
    max_response_chars: 30000
    tags:
      - openclaw-derived
      - superset
      - marketing
      - clients-phone
    source_evidence:
      - OpenClaw cron job "Клиенты с телефоном" uses Superset Client_analytics.
      - "Source metric from cron payload: Share of dine in identified orders via cashier."
      - OpenClaw automation captured dashboard 868, datasource 1615, and chart 18721.

  - name: dodo_auth_session_status
    description: Check OfficeManager/admin Dodo IS saved session health without printing secrets.
    connector: internal
    method: GET
    path: ""
    risk_level: admin
    enabled: false
    status: restricted
    requires_approval: true
    max_response_chars: 12000
    tags:
      - openclaw-derived
      - auth
      - restricted
    source_evidence:
      - OpenClaw cron job "Daily Dodo IS auth refresh" checked OfficeManager EmployeeList and admin Authenticate/Structure.
    # This remains disabled because it touches saved browser sessions/cookies and MFA state.

